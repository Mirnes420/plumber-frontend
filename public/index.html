<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Plumbing Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* File Upload Styling */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 120px;
            border: 2px dashed var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .file-upload-wrapper:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
        }

        .file-upload-text span {
            color: var(--primary);
            font-weight: 600;
        }

        #file-preview {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #10b981;
            display: none;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status-message {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            display: none;
            padding: 1rem;
            border-radius: 8px;
        }

        .success-msg {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <h1>Emergency Plumber</h1>
            <p class="subtitle">Submit a request and we'll instantly page our team via WhatsApp.</p>

            <form id="incident-form">
                <div class="form-group">
                    <label for="phone">Your WhatsApp Number (Include Country Code)</label>
                    <input type="tel" id="phone" name="phone" placeholder="e.g. 385919293138" required>
                </div>

                <div class="form-group">
                    <label for="description">Describe the Problem</label>
                    <textarea id="description" name="description" placeholder="Pipe burst under the kitchen sink, water everywhere!" required></textarea>
                </div>

                <div class="form-group">
                    <label>Photo of the Issue (Optional)</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="image" name="image" accept="image/*">
                        <div class="file-upload-text">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            <br>
                            Click to upload or drag and drop<br>
                            <span>PNG, JPG up to 5MB</span>
                        </div>
                    </div>
                    <div id="file-preview">File selected</div>
                </div>

                <button type="submit" id="submit-btn">
                    <span id="btn-text">Send Emergency Request</span>
                    <div class="spinner" id="spinner"></div>
                </button>

                <div id="status-message"></div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('incident-form');
        const fileInput = document.getElementById('image');
        const filePreview = document.getElementById('file-preview');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');
        const statusMessage = document.getElementById('status-message');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                filePreview.textContent = `Selected: ${this.files[0].name}`;
                filePreview.style.display = 'block';
            } else {
                filePreview.style.display = 'none';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Loading state
            submitBtn.disabled = true;
            btnText.textContent = 'Processing...';
            spinner.style.display = 'block';
            statusMessage.style.display = 'none';

            const formData = new FormData(form);

            try {
                const response = await fetch('/submit-form', {
                    method: 'POST',
                    body: formData
                });

                const contentType = response.headers.get("content-type");
                let result = {};
                
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    result = await response.json();
                } else {
                    const text = await response.text();
                    throw new Error("Server crashed or returned 502 Bad Gateway. (Check Render logs for Out of Memory errors)");
                }

                statusMessage.style.display = 'block';
                if (response.ok) {
                    statusMessage.className = 'success-msg';
                    statusMessage.textContent = '✅ Request received! Check your WhatsApp for updates.';
                    form.reset();
                    filePreview.style.display = 'none';
                } else {
                    throw new Error(result.error || 'Failed to submit request');
                }
            } catch (error) {
                statusMessage.style.display = 'block';
                statusMessage.className = 'error-msg';
                statusMessage.textContent = `❌ ${error.message}`;
            } finally {
                // Restore UI
                submitBtn.disabled = false;
                btnText.textContent = 'Send Emergency Request';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
