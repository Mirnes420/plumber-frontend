<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Plumbing Portal</title>
    <link rel="icon" type="image/x-icon" href="gemini-favi.ico">
    <link rel="shortcut icon" type="image/x-icon" href="gemini-favi.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>

        .suggest-pill {
            background: #121214;
            border: 1px solid #27272a;
            color: #a1a1aa;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .suggest-pill:hover {
            background: #27272a;
            color: #ffffff;
            border-color: #a1a1aa;
        }
        #reset-portal-btn:hover {
            background: #27272a !important;
        }


        :root {
            --bg-color: #050505;
            --card-bg: #121214;
            --border-color: #27272a;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-white: #ffffff;
            --accent-hover: #e4e4e7;
            --success: #09f195;
            --error: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            letter-spacing: -0.01em;
        }

        .container {
            width: 100%;
            max-width: 460px;
        }

        .minimal-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: #18181b;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea {
            padding: 0.85rem 1rem;
            resize: none;
            min-height: 110px;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-white);
            box-shadow: 0 0 0 1px var(--accent-white);
        }

        /* File Upload */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 90px;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #18181b;
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .file-upload-wrapper:hover {
            border-color: var(--accent-white);
            background: #202024;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-upload-text span {
            color: var(--text-primary);
            font-weight: 500;
        }

        #file-preview {
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--success);
            display: none;
            text-align: center;
            font-weight: 500;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent-white);
            color: #000000;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:active {
            transform: scale(0.99);
        }

        #status-message {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.5;
            display: none;
            padding: 1rem;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }

        .success-msg {
            background: rgba(9, 241, 149, 0.05);
            color: var(--success);
            border: 1px solid rgba(9, 241, 149, 0.15);
        }

        .error-msg {
            background: rgba(244, 63, 94, 0.05);
            color: var(--error);
            border: 1px solid rgba(244, 63, 94, 0.15);
        }

        .evaluating-msg {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .loading-pulse {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: pulse 1.2s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="minimal-card" id="portal-card">
            <div class="header">
                <div class="header-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <h1>Emergency Plumber</h1>
                <p class="subtitle">Submit details. We will instantly process the issue and page our emergency plumber on WhatsApp.</p>
            </div>

            <form id="incident-form">
                <div class="form-group">
                <label for="customer_name">Your Name</label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <input type="text" id="customer_name" name="customer_name" placeholder="e.g. John Doe" required>
                </div>
            </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                            </svg>
                        </div>
                        <input type="tel" id="phone" name="phone" placeholder="e.g. +385919293138" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Emergency Address / Location</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                        </div>
                        <input type="text" id="location" name="location" placeholder="Street name, apartment unit, city..." required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Problem Description</label>
                    <textarea id="description" name="description" placeholder="Describe the leak, block or damage..." required></textarea>
                    
                    <div class="pill-wrapper" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;">
                    <button type="button" class="suggest-pill" style="flex: 1 1 calc(33.333% - 8px); min-width: 140px;" data-text="Burst pipe under sink gushing hot water and kitchen flooded">💦 Burst Pipe</button>
                    <button type="button" class="suggest-pill" style="flex: 1 1 calc(33.333% - 8px); min-width: 140px;" data-text="Main sewage line backing up into the basement floor drain">💩 Sewer Backup</button>
                    <button type="button" class="suggest-pill" style="flex: 1 1 calc(33.333% - 8px); min-width: 140px;" data-text="Water heater tank leaking from base and running cold">🔥 Water Heater Leak</button>
                    <button type="button" class="suggest-pill" style="flex: 1 1 calc(33.333% - 8px); min-width: 140px;" data-text="Main toilet clogged up and overflowing onto bathroom floor">🚽 Clogged Toilet</button>
                    <button type="button" class="suggest-pill" style="flex: 1 1 calc(33.333% - 8px); min-width: 140px;" data-text="Kitchen faucet leaking from handles with a steady slow drip">💧 Slow Faucet Drip</button>
                </div>
                </div>

                <div class="form-group">
                    <label>Attach Photo (Optional)</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="image" name="image" accept="image/*">
                        <div class="file-upload-text">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <span>Upload Image File</span>
                        </div>
                    </div>
                    <div id="file-preview" style="display: none;">File selected</div>
                </div>

                <button type="submit" id="submit-btn">
                    <span>Send Request</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>

        <div class="minimal-card success-screen" id="success-card" style="display: none; text-align: center; padding: 40px 20px;">
            <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
            <h1 style="color: var(--success); margin-bottom: 12px;">Request Registered!</h1>
            <p style="color: var(--text-primary); font-size: 16px; margin-bottom: 8px; font-weight: 500;">Our best plumbers have been paged.</p>
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; max-width: 340px; margin-left: auto; margin-right: auto;">
                Expect a phone call or WhatsApp updates shortly. You can safely close this screen now.
            </p>
            <button type="button" id="reset-portal-btn" style="background: var(--border-color); color: var(--text-primary); border: 1px solid var(--border-color); padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 14px; transition: background 0.2s;">
                Submit Another Issue
            </button>
        </div>
    </div>

    <script>
        const form = document.getElementById('incident-form');
        const fileInput = document.getElementById('image');
        const filePreview = document.getElementById('file-preview');
        
        const portalCard = document.getElementById('portal-card');
        const successCard = document.getElementById('success-card');
        const resetPortalBtn = document.getElementById('reset-portal-btn');

        function getPlumberId() {
            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('plumber') || urlParams.get('id');
            if (id) return id;

            const pathParts = window.location.pathname.split('/');
            const lastPart = pathParts[pathParts.length - 1];
            if (lastPart.startsWith('id=')) {
                return lastPart.split('=')[1];
            }
            return '';
        }

        const plumberId = getPlumberId();

        document.querySelectorAll('.suggest-pill').forEach(pill => {
            pill.addEventListener('click', function() {
                document.getElementById('description').value = this.getAttribute('data-text');
            });
        });

        fileInput.addEventListener('change', function () {
            if (this.files && this.files[0]) {
                filePreview.textContent = `Selected: ${this.files[0].name}`;
                filePreview.style.display = 'block';
            } else {
                filePreview.style.display = 'none';
            }
        });

        async function submitWithRetry(formData, attempt = 1, maxAttempts = 10, delayMs = 8000) {
            try {
                const response = await fetch('/submit-form', {
                    method: 'POST',
                    body: formData
                });

                const contentType = response.headers.get("content-type");
                let result = {};

                if (contentType && contentType.indexOf("application/json") !== -1) {
                    result = await response.json();
                }

                if (!response.ok) {
                    throw new Error(result.error || `HTTP error ${response.status}`);
                }

                return result;
            } catch (error) {
                if (attempt < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, delayMs));
                    return submitWithRetry(formData, attempt + 1, maxAttempts, delayMs);
                } else {
                    console.error("Background delivery permanently failed:", error.message);
                }
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            if (plumberId) {
                formData.append('plumber_id', plumberId);
            }

            // CHANGED: Instantly flip the visual screens without waiting for backend networks
            portalCard.style.display = 'none';
            successCard.style.display = 'block';

            // Fire the request in the background decoupled from interface states
            submitWithRetry(formData);

            form.reset();
            if (filePreview) filePreview.style.display = 'none';
        });

        resetPortalBtn.addEventListener('click', () => {
            successCard.style.display = 'none';
            portalCard.style.display = 'block';
            
            const formElements = form.querySelectorAll('input, textarea, button');
            formElements.forEach(el => el.disabled = false);
        });
    </script>
</body>

</html>
